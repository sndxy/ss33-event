<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歲歲 33 擂台宴 - 官方賽事網頁</title>
    <style>
        :root {
            --fire-gold: #ffaa00;
            --glass-bg: rgba(10, 5, 5, 0.85);
            --border-glow: rgba(255, 170, 0, 0.6);
            --nurse-green: #a0ffd0;
            --time-tag: #ff4500;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #000; color: #fff; overflow-x: hidden;
        }

        /* 背景層 */
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('bg.gif');
            background-size: cover; background-position: center; z-index: -2;
        }
        .overlay-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('IMG_2574.jpg') no-repeat center center;
            background-size: cover; opacity: 0.3; z-index: -1;
        }

        .main-ui {
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px;
        }

        .main-title {
            font-size: clamp(2.2rem, 7vw, 3.8rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--fire-gold), #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.8));
            margin-bottom: 5px; letter-spacing: 10px;
        }

        /* 🚀 倒數計時器樣式 */
        .countdown-container {
            margin-bottom: 30px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(10px);
        }
        .countdown-label {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        #timer {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--fire-gold);
            text-shadow: 0 0 10px var(--fire-gold);
            font-family: 'Courier New', Courier, monospace; /* 等寬字體避免跳動 */
        }
        .timer-unit { font-size: 0.8rem; color: #fff; margin: 0 5px; }

        .time-info {
            font-size: 0.9rem; color: var(--time-tag);
            background: rgba(255, 69, 0, 0.1); padding: 2px 10px;
            border-radius: 10px; border: 1px solid var(--time-tag);
            margin-left: 10px;
        }

        .panel {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border-radius: 65px; border: 2px solid var(--border-glow);
            width: 100%; max-width: 850px;
            margin-bottom: 25px; padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .pool-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px; margin-top: 20px; text-align: center;
        }

        .class-icon {
            width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid var(--fire-gold); margin: 0 auto 5px;
            background-size: cover; background-position: center;
            box-shadow: 0 0 12px var(--border-glow);
        }

        /* 隨機滑動動畫 */
        .random-dps-box {
            width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid var(--fire-gold); overflow: hidden; position: relative; margin: 0 auto 5px;
        }
        .dps-slider {
            display: flex; flex-direction: column; width: 100%; 
            animation: dpsScroll 4s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        .dps-slide-img { width: 55px; height: 55px; flex-shrink: 0; background-size: cover; background-position: center; }
        @keyframes dpsScroll {
            0% { transform: translateY(0); }
            14% { transform: translateY(-55px); }
            28% { transform: translateY(-110px); }
            42% { transform: translateY(-165px); }
            56% { transform: translateY(-220px); }
            70% { transform: translateY(-275px); }
            84% { transform: translateY(-330px); }
            100% { transform: translateY(-385px); }
        }

        .cta-btn {
            background: linear-gradient(45deg, #b22222, #ff4500);
            color: white; padding: 15px 60px; border-radius: 50px;
            font-size: 1.3rem; font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 69, 0, 0.5);
        }
    </style>
</head>
<body>

<div class="main-bg"></div>
<div class="overlay-bg"></div>

<div class="main-ui">
    <h1 class="main-title">歲歲 33 擂台宴</h1>
    
    <div class="countdown-container">
        <div class="countdown-label" id="countdown-title">賽事即將開啟</div>
        <div id="timer">00<span class="timer-unit">天</span>00<span class="timer-unit">時</span>00<span class="timer-unit">分</span>00<span class="timer-unit">秒</span></div>
    </div>

    <div class="panel">
        <h2 style="color: var(--fire-gold); margin:0; text-align:center;">⚔️ 暴力輸出池 <span class="time-info">5/17 21:30</span></h2>
        <div class="pool-grid">
            <div><div class="class-icon" style="background-image: url('assets/4.png');"></div><small>碎夢</small></div>
            <div><div class="class-icon" style="background-image: url('assets/8.png');"></div><small>玄機</small></div>
            <div><div class="class-icon" style="background-image: url('assets/5.png');"></div><small>神相</small></div>
            <div><div class="class-icon" style="background-image: url('assets/2.png');"></div><small>九靈</small></div>
            <div><div class="class-icon" style="background-image: url('assets/3.png');"></div><small>鐵衣</small></div>
            <div><div class="class-icon" style="background-image: url('assets/6.png');"></div><small>血河</small></div>
            <div><div class="class-icon" style="background-image: url('assets/7.png');"></div><small>龍吟</small></div>
            <div><div class="class-icon" style="background-image: url('assets/1.png');"></div><small>天問</small></div>
        </div>
    </div>

    <div class="panel" style="border-color: var(--nurse-green);">
        <h2 style="color: var(--nurse-green); margin:0; text-align:center;">🌿 核心奶媽池 <span class="time-info" style="color:var(--nurse-green); border-color:var(--nurse-green);">5/16 21:30</span></h2>
        <div style="display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 20px;">
            <div style="text-align:center;">
                <div class="class-icon" style="border-color: var(--nurse-green); background-image: url('assets/1.png');"></div>
                <small>素問(素心)</small>
            </div>
            <div style="font-size: 2rem; color: var(--fire-gold);">+</div>
            <div style="text-align:center;">
                <div class="random-dps-box">
                    <div class="dps-slider">
                        <div class="dps-slide-img" style="background-image: url('assets/4.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/8.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/5.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/2.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/3.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/6.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/7.png');"></div>
                    </div>
                </div>
                <small>隨機 DPS</small>
            </div>
            <div style="text-align:center;">
                <div class="random-dps-box">
                    <div class="dps-slider" style="animation-delay: -2s;">
                        <div class="dps-slide-img" style="background-image: url('assets/5.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/2.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/7.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/4.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/8.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/6.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/3.png');"></div>
                    </div>
                </div>
                <small>隨機 DPS</small>
            </div>
        </div>
    </div>

    <button class="cta-btn">立即前往報名</button>
</div>

<script>
    // 🚀 設定比賽目標時間
    const events = [
        { name: "5/16 奶池賽倒數", time: new Date("May 16, 2026 21:30:00").getTime() },
        { name: "5/17 DPS池賽倒數", time: new Date("May 17, 2026 21:30:00").getTime() }
    ];

    function updateCountdown() {
        const now = new Date().getTime();
        let target = null;
        
        // 尋找下一個還沒開始的比賽
        for (let event of events) {
            if (now < event.time) {
                target = event;
                break;
            }
        }

        const timerDisplay = document.getElementById("timer");
        const titleDisplay = document.getElementById("countdown-title");

        if (!target) {
            titleDisplay.innerHTML = "賽事已全部結束";
            timerDisplay.innerHTML = "THANK YOU FOR WATCHING";
            return;
        }

        titleDisplay.innerHTML = target.name;
        const distance = target.time - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        timerDisplay.innerHTML = 
            days.toString().padStart(2, '0') + '<span class="timer-unit">天</span>' +
            hours.toString().padStart(2, '0') + '<span class="timer-unit">時</span>' +
            minutes.toString().padStart(2, '0') + '<span class="timer-unit">分</span>' +
            seconds.toString().padStart(2, '0') + '<span class="timer-unit">秒</span>';
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
