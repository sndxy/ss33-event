<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歲歲 33 擂台宴 - 賽事官網</title>
    <style>
        :root {
            --fire-gold: #ffaa00;
            --accent-gold: #ffd700;
            --bg-dark: #080202;
            --glass-bg: rgba(20, 10, 10, 0.95);
            --nurse-green: #a0ffd0;
            --win-color: #2ecc71;
            --lose-color: #e74c3c;
        }

        /* 🚀 純代碼底圖：黑紅動態漸層 */
        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #fff; background-color: var(--bg-dark);
            background: radial-gradient(circle at 50% 50%, #4a0000 0%, #000 80%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .main-ui { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        .main-title {
            font-size: clamp(2rem, 8vw, 3.8rem); font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--fire-gold), #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.8));
            margin: 20px 0; letter-spacing: 10px; text-align: center;
        }

        /* ⏳ 倒數計時 */
        .countdown-wrap { display: flex; gap: 10px; margin-bottom: 30px; }
        .time-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--fire-gold);
            padding: 10px 15px; border-radius: 10px; text-align: center; min-width: 60px;
        }
        .time-num { font-size: 1.8rem; font-weight: bold; color: var(--accent-gold); display: block; }
        .time-label { font-size: 0.6rem; color: #888; }

        .panel {
            background: var(--glass-bg); border-radius: 30px; border: 1.5px solid rgba(255, 170, 0, 0.3);
            width: 100%; max-width: 850px; margin-bottom: 25px; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative;
        }

        /* 🕒 比賽時間標籤 */
        .match-time-tag {
            position: absolute; top: -12px; right: 30px;
            background: linear-gradient(90deg, #ff4500, #b22222);
            padding: 5px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid var(--fire-gold);
        }

        /* 職業圖示 */
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 15px; text-align: center; }
        .class-icon {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--fire-gold); margin: 0 auto 5px;
            background-size: 75%; background-repeat: no-repeat; background-position: center; background-color: #111;
        }

        /* 🌿 奶池滾動修復 */
        .slot-machine { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        .slot-box { 
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--fire-gold); 
            overflow: hidden; position: relative; background: #000; 
        }
        .slot-track { display: flex; flex-direction: column; position: absolute; top: 0; animation: scroll-v 8s linear infinite; }
        .slot-item { width: 50px; height: 50px; background-size: 75%; background-repeat: no-repeat; background-position: center; }
        @keyframes scroll-v { 0% { transform: translateY(0); } 100% { transform: translateY(-350px); } }

        /* 彈窗 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); overflow-y: auto; }
        .modal-content { background: #110505; margin: 5vh auto; padding: 35px; border: 1px solid var(--fire-gold); width: 90%; max-width: 700px; border-radius: 30px; }

        /* ⚔️ 預賽燈號動畫恢復 */
        .light { width: 15px; height: 15px; border-radius: 50%; display: inline-block; margin: 0 5px; }
        .light-win { background: var(--win-color); box-shadow: 0 0 12px var(--win-color); animation: blink 1s infinite; }
        .light-lose { background: var(--lose-color); box-shadow: 0 0 12px var(--lose-color); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .btn-group { display: flex; gap: 20px; margin: 20px 0; }
        .btn { padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .btn-rules { background: #333; color: #fff; }
        .btn-join { background: linear-gradient(45deg, #b22222, #ff4500); color: #fff; box-shadow: 0 5px 15px rgba(255,69,0,0.4); }
    </style>
</head>
<body>

<div class="main-ui">
    <h1 class="main-title">歲歲 33 擂台宴</h1>

    <div class="countdown-wrap">
        <div class="time-card"><span class="time-num" id="d">00</span><span class="time-label">DAYS</span></div>
        <div class="time-card"><span class="time-num" id="h">00</span><span class="time-label">HRS</span></div>
        <div class="time-card"><span class="time-num" id="m">00</span><span class="time-label">MINS</span></div>
        <div class="time-card"><span class="time-num" id="s">00</span><span class="time-label">SECS</span></div>
    </div>

    <div class="panel">
        <div class="match-time-tag">比賽時間：20:30 - 21:10</div>
        <h3 style="text-align: center; color: var(--fire-gold); margin-bottom: 20px;">⚔️ 暴力輸出池 (DPS)</h3>
        <div class="pool-grid">
            <div><div class="class-icon" style="background-image: url('assets/4.png');"></div>碎夢</div>
            <div><div class="class-icon" style="background-image: url('assets/8.png');"></div>玄機</div>
            <div><div class="class-icon" style="background-image: url('assets/5.png');"></div>神相</div>
            <div><div class="class-icon" style="background-image: url('assets/2.png');"></div>九靈</div>
            <div><div class="class-icon" style="background-image: url('assets/3.png');"></div>鐵衣</div>
            <div><div class="class-icon" style="background-image: url('assets/6.png');"></div>血河</div>
            <div><div class="class-icon" style="background-image: url('assets/7.png');"></div>龍吟</div>
            <div><div class="class-icon" style="background-image: url('assets/1.png');"></div>天問</div>
        </div>
    </div>

    <div class="panel" style="border-color: var(--nurse-green);">
        <div class="match-time-tag" style="background: linear-gradient(90deg, #2e7d32, #1b5e20);">比賽時間：21:15 - 22:00</div>
        <h3 style="text-align: center; color: var(--nurse-green); margin-bottom: 20px;">🌿 核心奶媽池</h3>
        <div class="slot-machine">
            <div style="text-align:center;">
                <div class="class-icon" style="border-color: var(--nurse-green); background-image: url('assets/1.png');"></div>
                <small>素問</small>
            </div>
            <div style="font-size: 1.5rem; color: var(--fire-gold);">+</div>
            <div class="slot-box"><div class="slot-track">
                <div class="slot-item" style="background-image: url('assets/2.png');"></div>
                <div class="slot-item" style="background-image: url('assets/3.png');"></div>
                <div class="slot-item" style="background-image: url('assets/4.png');"></div>
                <div class="slot-item" style="background-image: url('assets/5.png');"></div>
                <div class="slot-item" style="background-image: url('assets/6.png');"></div>
                <div class="slot-item" style="background-image: url('assets/7.png');"></div>
                <div class="slot-item" style="background-image: url('assets/8.png');"></div>
            </div></div>
            <div class="slot-box"><div class="slot-track" style="animation-delay: -4s;">
                <div class="slot-item" style="background-image: url('assets/8.png');"></div>
                <div class="slot-item" style="background-image: url('assets/7.png');"></div>
                <div class="slot-item" style="background-image: url('assets/6.png');"></div>
                <div class="slot-item" style="background-image: url('assets/5.png');"></div>
                <div class="slot-item" style="background-image: url('assets/4.png');"></div>
                <div class="slot-item" style="background-image: url('assets/3.png');"></div>
                <div class="slot-item" style="background-image: url('assets/2.png');"></div>
            </div></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-rules" onclick="openModal('rulesModal')">賽制流程與動畫</button>
        <button class="btn btn-join" onclick="openModal('joinModal')">立即報名參加</button>
    </div>
</div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--fire-gold); text-align: center;">🏆 賽事詳解與動畫</h2>
        
        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--fire-gold);">
            <h3 style="margin-top:0;">⚔️ 預賽：雙敗淘汰制</h3>
            <p>累積兩場勝場即晉級，累積兩場敗場則淘汰。</p>
            <div style="line-height: 2.2;">
                範例 A：<span class="light light-win"></span> <span class="light light-win"></span> ➔ <b>晉級決賽</b><br>
                範例 B：<span class="light light-win"></span> <span class="light light-lose"></span> <span class="light light-win"></span> ➔ <b>晉級決賽</b><br>
                範例 C：<span class="light light-lose"></span> <span class="light light-lose"></span> ➔ <b>遺憾淘汰</b>
            </div>
        </div>

        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent-gold);">
            <h3 style="margin-top:0;">🔥 決賽圈：BO3 對抗</h3>
            <p>四強精英重新抽籤，進行三戰兩勝淘汰賽，勝者晉級總決賽。</p>
        </div>

        <button class="btn btn-join" style="width:100%; margin-top: 20px;" onclick="closeModal('rulesModal')">了解規則</button>
    </div>
</div>

<div id="joinModal" class="modal">
    <div class="modal-content" style="text-align:center;">
        <h2 style="color: #ff4500;">📢 報名方式</h2>
        <p style="margin: 30px 0; line-height: 2;">請前往 <b>歲歲 Discord</b><br>在「活動報名處」頻道登記</p>
        <button class="btn btn-join" onclick="closeModal('joinModal')">關閉</button>
    </div>
</div>

<script>
    function updateCountdown() {
        const target = new Date("May 16, 2026 21:30:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;
        if(diff < 0) return;
        document.getElementById('d').innerText = Math.floor(diff/86400000).toString().padStart(2,'0');
        document.getElementById('h').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
        document.getElementById('m').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        document.getElementById('s').innerText = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
    }
    setInterval(updateCountdown, 1000); updateCountdown();

    function openModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>

</body>
</html>
