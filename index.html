<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歲歲 33 擂台宴</title>
    <style>
        :root {
            --fire-gold: #ffaa00;
            --accent-gold: #ffd700;
            --glass-bg: rgba(10, 5, 5, 0.85);
            --nurse-green: #a0ffd0;
            --win-color: #2ecc71;
            --lose-color: #e74c3c;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #000;
            color: #fff; overflow-x: hidden;
        }

        /* 🚀 背景圖修正：直接引用你 GitHub 根目錄的圖片 */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), 
                        url('./IMG_2574.png'); /* 指向你 GitHub 上的檔案 */
            background-size: cover; background-position: center; z-index: -2;
        }

        .main-ui { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        .main-title {
            font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--fire-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
            margin-bottom: 30px; letter-spacing: 8px; text-align: center;
        }

        .panel {
            background: var(--glass-bg); border-radius: 30px; border: 1px solid rgba(255, 170, 0, 0.3);
            width: 100%; max-width: 800px; margin-bottom: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 職業圖標區域 */
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 10px; text-align: center; }
        .class-icon {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--fire-gold); margin: 0 auto 5px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        /* 奶池無限滾動區 */
        .slot-machine { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .slot-box { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--fire-gold); overflow: hidden; position: relative; background: #111; }
        .slot-track { display: flex; flex-direction: column; position: absolute; top: 0; animation: scroll-v 6s linear infinite; }
        .slot-item { width: 60px; height: 60px; background-size: 70%; background-repeat: no-repeat; background-position: center; flex-shrink: 0; }
        @keyframes scroll-v { 0% { transform: translateY(0); } 100% { transform: translateY(-420px); } }

        /* 按鈕 */
        .btn-join { 
            padding: 15px 50px; border-radius: 50px; background: linear-gradient(45deg, #ff4500, #ffaa00);
            color: #fff; font-weight: bold; border: none; cursor: pointer; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(255,69,0,0.4);
        }

        /* 彈窗規則區 */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background: #150505; margin: 5% auto; padding: 30px; border: 1px solid var(--fire-gold); width: 85%; max-width: 600px; border-radius: 20px; }

        /* 🏆 新版決賽對陣圖動畫 */
        .bracket { display: flex; justify-content: space-around; align-items: center; margin: 30px 0; position: relative; }
        .match-pair { display: flex; flex-direction: column; gap: 40px; }
        .team-box { width: 80px; padding: 8px; border: 1px solid #555; background: #222; font-size: 0.8rem; text-align: center; }
        .final-match { border: 2px solid var(--fire-gold); background: rgba(255,170,0,0.1); width: 100px; padding: 15px; text-align: center; }
        .connector { height: 2px; background: #555; flex-grow: 1; position: relative; }
        .glow-line { 
            position: absolute; height: 2px; background: var(--fire-gold); width: 0; left: 0;
            animation: grow-line 4s infinite; box-shadow: 0 0 10px var(--fire-gold);
        }
        @keyframes grow-line { 0% { width: 0; } 50% { width: 100%; } 100% { width: 100%; opacity: 0; } }

        /* 預賽燈號 */
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-win { background: var(--win-color); box-shadow: 0 0 8px var(--win-color); animation: blink 1.5s infinite; }
        .dot-lose { background: var(--lose-color); box-shadow: 0 0 8px var(--lose-color); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="bg-container"></div>

<div class="main-ui">
    <h1 class="main-title">歲歲 33 擂台宴</h1>

    <div class="panel">
        <h3 style="color: var(--fire-gold); text-align: center; margin-top: 0;">⚔️ 暴力輸出池</h3>
        <div class="pool-grid">
            <div><div class="class-icon" style="background-image: url('./assets/4.png');"></div>碎夢</div>
            <div><div class="class-icon" style="background-image: url('./assets/8.png');"></div>玄機</div>
            <div><div class="class-icon" style="background-image: url('./assets/5.png');"></div>神相</div>
            <div><div class="class-icon" style="background-image: url('./assets/2.png');"></div>九靈</div>
            <div><div class="class-icon" style="background-image: url('./assets/3.png');"></div>鐵衣</div>
            <div><div class="class-icon" style="background-image: url('./assets/6.png');"></div>血河</div>
            <div><div class="class-icon" style="background-image: url('./assets/7.png');"></div>龍吟</div>
            <div><div class="class-icon" style="background-image: url('./assets/1.png');"></div>天問</div>
        </div>
    </div>

    <div class="panel" style="border-color: var(--nurse-green);">
        <h3 style="color: var(--nurse-green); text-align: center; margin-top: 0;">🌿 核心奶媽池</h3>
        <div class="slot-machine">
            <div style="text-align: center;">
                <div class="class-icon" style="background-image: url('./assets/1.png'); border-color: var(--nurse-green);"></div>
                <small>素問(素心)</small>
            </div>
            <div style="font-size: 1.5rem; color: var(--fire-gold);">+</div>
            <div class="slot-box"><div class="slot-track">
                <div class="slot-item" style="background-image: url('./assets/2.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/3.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/4.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/5.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/6.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/7.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/8.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/2.png');"></div>
            </div></div>
            <div class="slot-box"><div class="slot-track" style="animation-delay: -3s;">
                <div class="slot-item" style="background-image: url('./assets/8.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/7.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/6.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/5.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/4.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/3.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/2.png');"></div>
                <div class="slot-item" style="background-image: url('./assets/8.png');"></div>
            </div></div>
        </div>
    </div>

    <button class="btn-join" onclick="openModal()">查看詳細賽制說明</button>
</div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--fire-gold); text-align: center;">🏆 賽事流程說明</h2>
        
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <h4 style="margin-top: 0;">1. 預賽：雙敗淘汰制</h4>
            <p style="font-size: 0.9rem; color: #ccc;">兩勝晉級決賽圈，兩敗則遺憾淘汰。</p>
            <div><span class="status-dot dot-win"></span> 勝勝 ➔ 晉級</div>
            <div><span class="status-dot dot-lose"></span> 敗敗 ➔ 淘汰</div>
        </div>

        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
            <h4 style="margin-top: 0;">2. 決賽圈：BO3 對陣賽</h4>
            <p style="font-size: 0.9rem; color: #ccc;">抽籤對決，勝者晉級冠亞軍賽。</p>
            
            <div class="bracket">
                <div class="match-pair">
                    <div class="team-box">隊伍 A</div>
                    <div class="team-box">隊伍 B</div>
                </div>
                <div class="connector"><div class="glow-line"></div></div>
                <div class="final-match">
                    <small style="color: var(--fire-gold);">總決賽</small><br>
                    <strong>BO3 爭霸</strong>
                </div>
                <div class="connector"><div class="glow-line" style="animation-delay: 2s;"></div></div>
                <div class="match-pair">
                    <div class="team-box">隊伍 C</div>
                    <div class="team-box">隊伍 D</div>
                </div>
            </div>
        </div>

        <button class="btn-join" style="width: 100%; margin-top: 20px;" onclick="closeModal()">關閉說明</button>
    </div>
</div>

<script>
    function openModal() { document.getElementById('rulesModal').style.display = 'block'; }
    function closeModal() { document.getElementById('rulesModal').style.display = 'none'; }
</script>

</body>
</html>
