<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歲歲 33 擂台宴</title>
    <style>
        :root {
            --fire-gold: #ffaa00;
            --glass-bg: rgba(10, 5, 5, 0.95);
            --border-glow: rgba(255, 170, 0, 0.6);
            --nurse-green: #a0ffd0;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; font-family: "Microsoft JhengHei", sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }

        /* 背景：絕對路徑 + 強制刷新 */
        .bg-gif {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('https://sndxy.github.io/ss33-event/bg.gif');
            background-size: cover; background-position: center; z-index: -2;
        }

        .main-ui { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        .main-title {
            font-size: clamp(2.2rem, 7vw, 3.8rem); font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--fire-gold), #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.8));
            margin-bottom: 20px; letter-spacing: 10px; text-align: center;
        }

        /* 倒數計時 */
        .countdown-container {
            background: rgba(0, 0, 0, 0.7); padding: 15px 30px; border-radius: 40px;
            border: 1px solid var(--border-glow); backdrop-filter: blur(10px); margin-bottom: 30px; text-align: center;
        }
        #timer { font-size: 2rem; color: var(--fire-gold); font-family: monospace; font-weight: bold; }

        .panel {
            background: var(--glass-bg); border-radius: 60px; border: 2px solid var(--border-glow);
            width: 100%; max-width: 850px; margin-bottom: 25px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        /* 職業圖標 (DPS) */
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 15px; text-align: center; }
        .class-icon {
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--fire-gold); margin: 0 auto 5px;
            background-size: 75%; background-repeat: no-repeat; background-position: center; background-color: rgba(0,0,0,0.5);
        }

        /* 奶池無限滾動區 */
        .slot-machine { display: flex; justify-content: center; align-items: center; gap: 25px; margin-top: 20px; }
        .slot-box { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--fire-gold); overflow: hidden; position: relative; background: #000; }
        .slot-track { display: flex; flex-direction: column; position: absolute; top: 0; left: 0; animation: scroll-inf 6s linear infinite; }
        .slot-item { width: 60px; height: 60px; background-size: 70%; background-repeat: no-repeat; background-position: center; flex-shrink: 0; }

        @keyframes scroll-inf { 0% { transform: translateY(0); } 100% { transform: translateY(-420px); } } /* 7個圖標 * 60px */

        /* 按鈕樣式 */
        .btn-group { display: flex; gap: 20px; margin-top: 20px; }
        .btn {
            padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; border: none; cursor: pointer; transition: 0.3s;
        }
        .btn-rules { background: #444; color: #fff; }
        .btn-join { background: linear-gradient(45deg, #ff4500, #ffaa00); color: #fff; box-shadow: 0 0 15px rgba(255,69,0,0.5); }

        /* 彈窗 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content {
            background: var(--glass-bg); margin: 5vh auto; padding: 40px; border: 2px solid var(--fire-gold);
            width: 85%; max-width: 600px; border-radius: 40px; position: relative; text-align: center;
        }

        /* 階梯動畫修正 */
        .ladder-wrap { margin: 20px auto; width: 200px; height: 120px; position: relative; border-left: 3px solid #fff; border-bottom: 3px solid #fff; }
        .ladder-step { position: absolute; background: var(--fire-gold); width: 40px; height: 10px; right: 0; }
        .climbing-dot { 
            position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; 
            animation: climb 3s infinite steps(4); 
        }
        @keyframes climb { 0% { bottom: 0; left: 0; } 100% { bottom: 100px; left: 180px; } }
    </style>
</head>
<body>

<div class="bg-gif"></div>

<div class="main-ui">
    <h1 class="main-title">歲歲 33 擂台宴</h1>

    <div class="countdown-container">
        <div id="countdown-label" style="font-size: 0.9rem; color: #aaa; margin-bottom: 5px;">距離 5/16 奶池賽還有</div>
        <div id="timer">00天 00:00:00</div>
    </div>

    <div class="panel">
        <h3 style="text-align: center; color: var(--fire-gold); margin-top: 0;">⚔️ 暴力輸出池 (DPS)</h3>
        <div class="pool-grid">
            <div><div class="class-icon" style="background-image: url('https://sndxy.github.io/ss33-event/assets/4.png');"></div><small>碎夢</small></div>
            <div><div class="class-icon" style="background-image: url('https://sndxy.github.io/ss33-event/assets/8.png');"></div><small>玄機</small></div>
            <div><div class="class-icon" style="background-image: url('https://sndxy.github.io/ss33-event/assets/5.png');"></div><small>神相</small></div>
            <div><div class="class-icon" style="background-image: url('https://sndxy.github.io/ss33-event/assets/2.png');"></div><small>九靈</small></div>
            <div><div class="class-icon" style="background-image: url('https://sndxy.github.io/ss33-event/assets/3.png');"></div><small>鐵衣</small></div>
            <div><div class="class-icon" style="background-image: url('https://sndxy.github.io/ss33-event/assets/6.png');"></div><small>血河</small></div>
            <div><div class="class-icon" style="background-image: url('https://sndxy.github.io/ss33-event/assets/7.png');"></div><small>龍吟</small></div>
            <div><div class="class-icon" style="background-image: url('https://sndxy.github.io/ss33-event/assets/1.png');"></div><small>天問</small></div>
        </div>
    </div>

    <div class="panel" style="border-color: var(--nurse-green);">
        <h3 style="text-align: center; color: var(--nurse-green); margin-top: 0;">🌿 核心奶媽池 (1奶+2隨機輸出)</h3>
        <div class="slot-machine">
            <div style="text-align:center;">
                <div class="class-icon" style="border-color: var(--nurse-green); background-image: url('https://sndxy.github.io/ss33-event/assets/1.png'); width: 60px; height: 60px;"></div>
                <small>素問(素心)</small>
            </div>
            <div style="font-size: 2rem; color: var(--fire-gold);">+</div>
            
            <div class="slot-box">
                <div class="slot-track">
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/2.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/3.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/4.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/5.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/6.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/7.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/8.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/2.png');"></div>
                </div>
            </div>

            <div class="slot-box">
                <div class="slot-track" style="animation-delay: -3s;">
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/8.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/7.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/6.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/5.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/4.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/3.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/2.png');"></div>
                    <div class="slot-item" style="background-image: url('https://sndxy.github.io/ss33-event/assets/8.png');"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-rules" onclick="openRules()">賽事規程動畫</button>
        <button class="btn btn-join" onclick="openJoin()">立即前往報名</button>
    </div>
</div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; top:20px; right:30px; cursor:pointer; font-size:2rem;" onclick="closeModal('rulesModal')">&times;</span>
        <h2 style="color: var(--fire-gold);">🏆 階梯挑戰賽制說明</h2>
        <p>預賽採雙敗淘汰，決賽積分重置後抽籤進行階梯挑戰：</p>
        <div class="ladder-wrap">
            <div class="climbing-dot"></div>
            <div class="ladder-step" style="bottom: 30px; width: 60px;"></div>
            <div class="ladder-step" style="bottom: 60px; width: 100px;"></div>
            <div class="ladder-step" style="bottom: 90px; width: 140px;"></div>
        </div>
        <p style="font-size: 0.9rem; color: #aaa;">由下往上挑戰，勝者晉級下一層</p>
    </div>
</div>

<div id="joinModal" class="modal">
    <div class="modal-content" style="border-color: #ff4500;">
        <span style="position:absolute; top:20px; right:30px; cursor:pointer; font-size:2rem;" onclick="closeModal('joinModal')">&times;</span>
        <h2 style="color: #ff4500;">📢 報名提示</h2>
        <p style="font-size: 1.2rem; margin: 30px 0;">本賽事採取 <br><b style="color: var(--fire-gold);">歲歲 Discord 活動報名處</b> <br>進行登記</p>
        <button class="btn btn-join" onclick="closeModal('joinModal')">我知道了</button>
    </div>
</div>

<script>
    // 倒數計時
    function updateTimer() {
        const now = new Date();
        const target = new Date("May 16, 2026 21:30:00");
        const diff = target - now;
        if(diff <= 0) { document.getElementById("timer").innerText = "賽事進行中！"; return; }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById("timer").innerText = `${d}天 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    setInterval(updateTimer, 1000); updateTimer();

    function openRules() { document.getElementById("rulesModal").style.display = "block"; }
    function openJoin() { document.getElementById("joinModal").style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>

</body>
</html>
