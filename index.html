<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歲歲 33 擂台宴 - 官方賽事網頁</title>
    <style>
        :root {
            --fire-gold: #ffaa00;
            --glass-bg: rgba(10, 5, 5, 0.92);
            --border-glow: rgba(255, 170, 0, 0.6);
            --nurse-green: #a0ffd0;
            --win-green: #2ecc71;
            --lose-red: #e74c3c;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #000; color: #fff; overflow-x: hidden;
        }

        /* 🚀 背景：bg.gif (動態火焰) */
        .bg-gif {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                              url('bg.gif'); 
            background-size: cover; background-position: center; z-index: -2;
        }

        .main-ui {
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 20px; min-height: 100vh;
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--fire-gold), #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 69, 0, 0.8));
            margin-bottom: 10px; letter-spacing: 12px;
            text-align: center;
        }

        /* 🚀 倒數計時器 */
        .countdown-container {
            margin-bottom: 30px; text-align: center;
            background: rgba(0, 0, 0, 0.6); padding: 12px 25px;
            border-radius: 30px; border: 1px solid var(--border-glow);
            backdrop-filter: blur(15px);
        }
        .countdown-label { font-size: 0.85rem; color: #bbb; margin-bottom: 5px; letter-spacing: 2px; }
        #timer { font-size: 1.8rem; font-weight: bold; color: var(--fire-gold); text-shadow: 0 0 10px var(--fire-gold); }
        .timer-unit { font-size: 0.75rem; color: #fff; margin: 0 5px; }

        /* 🏆 極致圓潤面板 */
        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border-radius: 65px; 
            border: 2px solid var(--border-glow);
            width: 100%; max-width: 880px;
            margin-bottom: 30px; padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* 🚀 職業圖片：鎖定 55px */
        .class-icon {
            width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid var(--fire-gold);
            margin: 0 auto 8px;
            background-size: cover; background-position: center;
            box-shadow: 0 0 12px var(--border-glow);
            background-color: #222; position: relative; overflow: hidden;
        }

        .pool-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px; margin-top: 25px; text-align: center;
        }

        /* 🚀 隨機 DPS 滑動框：鎖定 55px */
        .random-dps-box {
            width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid var(--fire-gold);
            overflow: hidden; position: relative; margin: 0 auto 8px;
            box-shadow: 0 0 12px var(--fire-gold);
        }
        .dps-slider { display: flex; flex-direction: column; width: 100%; animation: dpsScroll 4s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .dps-slide-img { width: 55px; height: 55px; flex-shrink: 0; background-size: cover; background-position: center; }
        
        @keyframes dpsScroll { 
            0%, 10% { transform: translateY(0); } 
            14%, 24% { transform: translateY(-55px); } 
            28%, 38% { transform: translateY(-110px); } 
            42%, 52% { transform: translateY(-165px); } 
            56%, 66% { transform: translateY(-220px); } 
            70%, 80% { transform: translateY(-275px); } 
            84%, 94% { transform: translateY(-330px); } 
            100% { transform: translateY(-385px); } 
        }

        .rule-btn {
            background: linear-gradient(45deg, #8b0000, #ff4500);
            color: white; padding: 15px 50px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.4);
        }

        /* 彈窗系統 */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content {
            background: var(--glass-bg);
            /* 🚀 修正：IMG_2574.png 做為背景 */
            background-image: linear-gradient(rgba(10,5,5,0.88), rgba(10,5,5,0.98)), 
                              url('IMG_2574.png'); 
            background-size: cover; background-position: center;
            margin: 5vh auto; padding: 40px;
            border: 2px solid var(--fire-gold); width: 85%; max-width: 750px;
            border-radius: 50px; max-height: 85vh; overflow-y: auto; position: relative;
        }
        .close { position: absolute; right: 30px; top: 20px; font-size: 2.5rem; cursor: pointer; color: var(--fire-gold); }
        .example-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 25px; margin: 15px 0; border-left: 5px solid var(--fire-gold); }
        
        .ladder-container { position: relative; width: 100%; max-width: 400px; margin: 30px auto; }
        .step { height: 50px; margin: 12px 0; border: 1px solid var(--fire-gold); border-radius: 20px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); font-weight: bold; }
        .challenger-dot { position: absolute; left: -10px; width: 40px; height: 40px; background: var(--fire-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; animation: climb 6s infinite ease-in-out; }
        @keyframes climb { 0% { bottom: 0; opacity: 1; } 30% { bottom: 62px; } 60% { bottom: 124px; } 90% { bottom: 186px; opacity: 1; } 100% { bottom: 186px; opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-gif"></div>

<div class="main-ui">
    <h1 class="main-title">歲歲 33 擂台宴</h1>

    <div class="countdown-container">
        <div class="countdown-label" id="countdown-title">賽事準備中</div>
        <div id="timer">00<span class="timer-unit">天</span>00<span class="timer-unit">時</span>00<span class="timer-unit">分</span>00<span class="timer-unit">秒</span></div>
    </div>

    <div class="panel">
        <h2 style="color: var(--fire-gold); margin:0; text-align: center;">⚔️ 暴力輸出池 (5/17 21:30)</h2>
        <div class="pool-grid">
            <div><div class="class-icon" style="background-image: url('assets/4.png');"></div><small>碎夢</small></div>
            <div><div class="class-icon" style="background-image: url('assets/8.png');"></div><small>玄機</small></div>
            <div><div class="class-icon" style="background-image: url('assets/5.png');"></div><small>神相</small></div>
            <div><div class="class-icon" style="background-image: url('assets/2.png');"></div><small>九靈</small></div>
            <div><div class="class-icon" style="background-image: url('assets/3.png');"></div><small>鐵衣</small></div>
            <div><div class="class-icon" style="background-image: url('assets/6.png');"></div><small>血河</small></div>
            <div><div class="class-icon" style="background-image: url('assets/7.png');"></div><small>龍吟</small></div>
            <div><div class="class-icon" style="background-image: url('assets/1.png');"></div><small>天問</small></div>
        </div>
    </div>

    <div class="panel" style="border-color: var(--nurse-green);">
        <h2 style="color: var(--nurse-green); margin:0; text-align: center;">🌿 核心奶媽池 (5/16 21:30)</h2>
        <div style="display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 25px;">
            <div style="text-align:center;">
                <div class="class-icon" style="border-color: var(--nurse-green); background-image: url('assets/1.png');"></div>
                <small>素問(素心)</small>
            </div>
            <div style="font-size: 2.5rem; color: var(--fire-gold);">+</div>
            <div style="text-align:center;">
                <div class="random-dps-box">
                    <div class="dps-slider">
                        <div class="dps-slide-img" style="background-image: url('assets/4.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/8.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/5.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/2.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/3.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/6.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/7.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/4.png');"></div>
                    </div>
                </div>
                <small>隨機 DPS</small>
            </div>
            <div style="text-align:center;">
                <div class="random-dps-box">
                    <div class="dps-slider" style="animation-delay: -2s;">
                        <div class="dps-slide-img" style="background-image: url('assets/5.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/2.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/7.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/4.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/8.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/6.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/3.png');"></div>
                        <div class="dps-slide-img" style="background-image: url('assets/5.png');"></div>
                    </div>
                </div>
                <small>隨機 DPS</small>
            </div>
        </div>
    </div>

    <div class="panel" style="text-align: center; border-style: dashed;">
        <h2 style="color: var(--fire-gold);">📜 比賽詳情與注意事項</h2>
        <button class="rule-btn" onclick="openModal()">查看詳細規程與範例</button>
    </div>

    <button class="rule-btn" style="padding: 20px 100px; font-size: 1.5rem; margin-top: 10px;">立即報名參賽</button>
</div>

<div id="ruleModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 style="color: var(--fire-gold); text-align: center;">📜 詳細規程與範例</h2>
        <h3>一、 預賽阶段 (雙敗淘汰)</h3>
        <p>所有隊伍進行預選，爭奪晉級資格。</p>
        <div class="example-box">
            - <strong>雙勝晉級</strong>：兩勝直接晉級決賽。<br>
            - <strong>雙敗淘汰</strong>：兩敗則遺憾出局。
        </div>
        <h3>二、 決賽阶段 (階梯挑戰 BO3)</h3>
        <div class="ladder-container">
            <div class="challenger-dot">隊</div>
            <div class="step" style="border-color:#fff;">🏆 最終擂台主 (Finals)</div>
            <div class="step">第三挑戰位</div>
            <div class="step">第二挑戰位</div>
            <div class="step">第一挑戰位</div>
        </div>
        <button class="rule-btn" style="width:100%; margin-top:20px;" onclick="closeModal()">了解完畢</button>
    </div>
</div>

<script>
    const events = [
        { name: "5/16 奶池賽倒數", time: new Date("May 16, 2026 21:30:00").getTime() },
        { name: "5/17 DPS池賽倒數", time: new Date("May 17, 2026 21:30:00").getTime() }
    ];
    function updateCountdown() {
        const now = new Date().getTime();
        let target = null;
        for (let event of events) { if (now < event.time) { target = event; break; } }
        const timerDisplay = document.getElementById("timer");
        const titleDisplay = document.getElementById("countdown-title");
        if (!target) { titleDisplay.innerHTML = "賽事進行中"; timerDisplay.innerHTML = "GOOD LUCK"; return; }
        titleDisplay.innerHTML = target.name;
        const dist = target.time - now;
        const d = Math.floor(dist/(1000*60*60*24));
        const h = Math.floor((dist%(1000*60*60*24))/(1000*60*60));
        const m = Math.floor((dist%(1000*60*60))/(1000*60));
        const s = Math.floor((dist%(1000*60))/1000);
        timerDisplay.innerHTML = d.toString().padStart(2,'0')+'<span class="timer-unit">天</span>'+h.toString().padStart(2,'0')+'<span class="timer-unit">時</span>'+m.toString().padStart(2,'0')+'<span class="timer-unit">分</span>'+s.toString().padStart(2,'0')+'<span class="timer-unit">秒</span>';
    }
    setInterval(updateCountdown, 1000); updateCountdown();
    function openModal() { document.getElementById("ruleModal").style.display = "block"; }
    function closeModal() { document.getElementById("ruleModal").style.display = "none"; }
</script>

</body>
</html>
