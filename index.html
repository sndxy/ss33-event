<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歲歲 33 擂台宴 - 競技官網</title>
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --secondary-purple: #bc13fe;
            --bg-dark: #06090f;
            --panel-bg: rgba(6, 9, 15, 0.92);
            --win-green: #00ff88;
            --lose-red: #ff0055;
        }

        /* 🚀 背景設計 */
        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #fff;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                url('BG.png'); 
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            overflow-x: hidden; /* 防止手機左右滑動 */
        }

        .main-container {
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 15px; /* 縮小邊距適應手機 */
            box-sizing: border-box;
        }

        /* 🚀 標題設計：支援響應式縮放 */
        .header-section { text-align: center; margin-bottom: 30px; width: 100%; }
        
        .countdown-title {
            color: var(--primary-cyan);
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 8px;
            font-size: 1.1rem;
            text-shadow: 0 0 10px var(--primary-cyan);
        }

        .main-title {
            font-size: clamp(2rem, 10vw, 4.5rem); /* 自動根據寬度調整大小 */
            font-weight: 900;
            font-family: "Kaiti", "STKaiti", serif;
            font-style: italic;
            background: linear-gradient(to bottom, #fff, var(--primary-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.9));
            margin: 0; 
            letter-spacing: 10px; /* 手機版間距縮小 */
        }

        /* ⏳ 倒數計時容器：手機版會自動換行 */
        .countdown-wrap { 
            display: flex; 
            justify-content: center;
            flex-wrap: wrap; /* 重要：空間不足自動換行 */
            gap: 10px; 
            margin-top: 20px; 
        }
        .time-box {
            background: rgba(22, 27, 34, 0.8); 
            border: 2px solid var(--primary-cyan);
            padding: 10px; border-radius: 12px; 
            min-width: 65px; text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .time-num { font-size: 1.8rem; font-weight: 900; color: var(--primary-cyan); display: block; line-height: 1; }
        .time-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; margin-top: 4px; display: block; }

        /* 面板設計 */
        .panel {
            background: var(--panel-bg); 
            border-radius: 20px;
            border: 2px solid var(--primary-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            width: 100%; max-width: 900px;
            margin-bottom: 25px; padding: 20px;
            position: relative;
            box-sizing: border-box;
        }
        .panel-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 15px;
            flex-wrap: wrap; /* 手機版時間標籤會掉到下一行 */
            gap: 10px;
        }
        .panel-title { font-size: 1.3rem; font-weight: bold; color: var(--primary-cyan); margin: 0; }
        .match-time { background: var(--secondary-purple); padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }

        /* 🌿 奶池滾動框：手機版對齊修正 */
        .slot-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            padding: 10px 0;
            flex-wrap: nowrap; /* 保持在同一行，但縮小圓圈 */
        }
        
        .icon-circle-main, .slot-box {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid var(--primary-cyan);
            overflow: hidden;
            position: relative;
            background: rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        .icon-circle-main { 
            background-size: cover; 
            background-position: center; 
            border-color: var(--win-green);
        }

        .slot-track { display: flex; flex-direction: column; position: absolute; top: 0; animation: scroll-v-new 8s linear infinite; }
        
        @keyframes scroll-v-new { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(-525px); } 
        }

        .slot-item { 
            width: 75px; height: 75px; 
            background-size: 70%; 
            background-repeat: no-repeat; 
            background-position: center; 
            flex-shrink: 0; 
        }

        /* ⚔️ DPS 職業圖示：手機版每行顯示 4 個 */
        .pool-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            text-align: center; 
        }
        .icon-circle {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary-cyan); margin: 0 auto 5px;
            background-size: 70%; background-repeat: no-repeat; background-position: center; background-color: rgba(0,0,0,0.5);
        }
        .pool-grid div { font-size: 0.8rem; }

        /* 按鈕區：手機版垂直排列 */
        .btn-group { display: flex; gap: 15px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .btn { 
            padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; font-size: 1rem;
            width: 100%; max-width: 300px;
        }
        .btn-outline { background: transparent; color: #fff; border: 1px solid #444; }
        .btn-primary { background: var(--primary-cyan); color: #000; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        /* 🏆 手機版 Media Query 修正 */
        @media (max-width: 480px) {
            .main-title { letter-spacing: 5px; font-size: 2.2rem; }
            .icon-circle-main, .slot-box, .slot-item { width: 60px; height: 60px; }
            .slot-track { animation: scroll-v-mobile 8s linear infinite; }
            @keyframes scroll-v-mobile { 
                0% { transform: translateY(0); } 
                100% { transform: translateY(-420px); } /* 7個圖標 * 60px */
            }
            .pool-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .icon-circle { width: 45px; height: 45px; }
            .panel { padding: 15px; }
            .time-num { font-size: 1.5rem; }
            .time-box { min-width: 55px; padding: 8px; }
        }

        /* 彈窗樣式保持不變 */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #0a0e17; margin: 2vh auto; padding: 25px; border: 1px solid var(--primary-cyan); width: 85%; border-radius: 20px; }
        .light { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin: 0 3px; vertical-align: middle; }
        .win { background: var(--win-green); box-shadow: 0 0 10px var(--win-green); animation: pulse 1s infinite; }
        .lose { background: var(--lose-red); box-shadow: 0 0 10px var(--lose-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .bracket-container { display: flex; flex-direction: column; gap: 20px; align-items: center; margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; }
        .bracket-column { display: flex; flex-direction: row; gap: 15px; }
        .team-card { width: 90px; padding: 10px; font-size: 0.8rem; background: #161b22; border: 1px solid #333; text-align: center; }
        .champion-card { width: 140px; padding: 20px; border: 2px solid var(--secondary-purple); background: rgba(188, 19, 254, 0.1); text-align: center; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <div class="countdown-title">⚔️ 開戰倒數 ⚔️</div>
        <h1 class="main-title">歲歲 33 擂台宴</h1>
        <div class="countdown-wrap">
            <div class="time-box"><span class="time-num" id="d">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-num" id="h">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-num" id="m">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span class="time-num" id="s">00</span><span class="time-label">Secs</span></div>
        </div>
    </div>

    <div class="panel" style="text-align: center;">
        <div class="panel-header">
            <h2 class="panel-title">🌿 核心奶媽池</h2>
            <div class="match-time">5/16 (六) 21:30</div>
        </div>
        <div class="slot-container">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="icon-circle-main" style="background-image: url('assets/1.png');"></div>
                <div style="font-size: 0.75rem; color: #fff; margin-top: 5px; font-weight: bold;">核心：素問</div>
            </div>
            <div style="font-size: 1.5rem; color: var(--secondary-purple); font-weight: 900;">+</div>
            <div class="slot-box">
                <div class="slot-track">
                    <div class="slot-item" style="background-image: url('assets/4.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/8.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/5.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/2.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/3.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/6.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/7.png');"></div>
                </div>
            </div>
            <div class="slot-box">
                <div class="slot-track" style="animation-delay: -3.5s;">
                    <div class="slot-item" style="background-image: url('assets/2.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/5.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/8.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/7.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/6.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/4.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/3.png');"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h2 class="panel-title">⚔️ 暴力輸出池</h2>
            <div class="match-time" style="background: #0066ff;">5/17 (日) 21:30</div>
        </div>
        <div class="pool-grid">
            <div><div class="icon-circle" style="background-image: url('assets/4.png');"></div>碎夢</div>
            <div><div class="icon-circle" style="background-image: url('assets/8.png');"></div>玄機</div>
            <div><div class="icon-circle" style="background-image: url('assets/5.png');"></div>神相</div>
            <div><div class="icon-circle" style="background-image: url('assets/2.png');"></div>九靈</div>
            <div><div class="icon-circle" style="background-image: url('assets/3.png');"></div>鐵衣</div>
            <div><div class="icon-circle" style="background-image: url('assets/6.png');"></div>血河</div>
            <div><div class="icon-circle" style="background-image: url('assets/7.png');"></div>龍吟</div>
            <div><div class="icon-circle" style="background-image: url('assets/1.png');"></div>天問</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-outline" onclick="openModal('rulesModal')">賽制動畫說明</button>
        <button class="btn btn-primary" onclick="openModal('joinModal')">立即報名參加</button>
    </div>
</div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--primary-cyan); text-align: center; border-bottom: 2px solid var(--primary-cyan); padding-bottom: 10px;">🏆 賽制流程</h2>
        <div style="margin-top: 20px;">
            <h3>1. 預賽：雙敗淘汰</h3>
            <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; font-size: 0.9rem;">
                <span class="light win"></span> <span class="light win"></span> ➜ 晉級<br>
                <span class="light lose"></span> <span class="light lose"></span> ➜ 淘汰
            </div>
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="closeModal('rulesModal')">關閉</button>
    </div>
</div>

<div id="joinModal" class="modal">
    <div class="modal-content" style="text-align: center;">
        <h2 style="color: var(--secondary-purple);">📢 報名方式</h2>
        <p>請前往 <b>歲歲 Discord</b> 活動頻道！</p>
        <button class="btn btn-primary" onclick="closeModal('joinModal')">我知道了</button>
    </div>
</div>

<script>
    function updateTimer() {
        const target = new Date("May 16, 2026 21:30:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;
        if(diff < 0) return;
        document.getElementById('d').innerText = Math.floor(diff/86400000).toString().padStart(2,'0');
        document.getElementById('h').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
        document.getElementById('m').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        document.getElementById('s').innerText = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
    }
    setInterval(updateTimer, 1000); updateTimer();
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
