<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歲歲三三擂台宴 - 競技官網</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --secondary-purple: #bc13fe;
            --bg-dark: #06090f;
            --panel-bg: rgba(6, 9, 15, 0.15); 
            --win-green: #00ff88;
            --lose-red: #ff0055;
            --neon-green: #39FF14;
            --gold: #ffd700;
        }

        /* 🚀 背景設定 */
        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: "Microsoft JhengHei", -apple-system, sans-serif;
            color: #fff;
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('BG.gif'); 
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            overflow-x: hidden;
        }

        /* 🎵 音樂按鈕樣式 */
        .music-btn {
            position: fixed; top: 20px; right: 20px; z-index: 10001; 
            cursor: pointer; background: rgba(0,0,0,0.6); 
            border: 1px solid var(--primary-cyan); 
            width: 45px; height: 45px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            transition: all 0.3s ease; 
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }
        .music-playing {
            animation: musicRotate 4s linear infinite;
            border-color: var(--win-green) !important;
            box-shadow: 0 0 15px var(--win-green) !important;
        }
        @keyframes musicRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 🔴 霧面紅點 */
        .cursor-trail {
            width: 12px; height: 12px;
            background: rgba(255, 0, 0, 0.6);
            position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); filter: blur(4px);
        }

        .main-container {
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 15px; box-sizing: border-box;
        }

        /* 🚀 標題 */
        .header-section { text-align: center; margin-bottom: 30px; width: 100%; }
        .edition-text {
            font-family: 'Ma Shan Zheng', serif;
            font-size: 1.6rem; color: var(--gold);
            letter-spacing: 12px; margin-bottom: -15px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
            display: block; margin-top: 15px;
        }
        .countdown-title { color: var(--primary-cyan); font-weight: bold; letter-spacing: 5px; font-size: 1.1rem; }
        .main-title {
            font-family: 'Ma Shan Zheng', 'Noto Serif TC', serif;
            font-weight: 900; font-size: clamp(2.8rem, 12vw, 5.5rem); font-style: italic; 
            margin: 10px 0; letter-spacing: 4px; position: relative; display: inline-block;
            color: transparent; background-image: linear-gradient(to bottom, #000000 0%, #660000 40%, #cc0000 70%, #ff4500 100%);
            -webkit-background-clip: text; background-clip: text;
            filter: drop-shadow(0 0 5px rgba(0, 0, 0, 1)) drop-shadow(0 0 12px rgba(255, 69, 0, 0.8));
        }

        /* 倒數計時 */
        .countdown-wrap { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .time-box { background: rgba(0, 0, 0, 0.4); border: 2px solid var(--primary-cyan); padding: 10px; border-radius: 12px; min-width: 65px; text-align: center; }
        .time-num { font-size: 1.8rem; font-weight: 900; color: var(--primary-cyan); display: block; }

        /* 面板樣式 */
        .panel { 
            background: var(--panel-bg); border-radius: 20px; border: 1.2px solid rgba(0, 242, 255, 0.4); 
            backdrop-filter: blur(3px); width: 100%; max-width: 900px; margin-bottom: 25px; padding: 20px; box-sizing: border-box; 
        }

        /* 職業滾動 */
        .slot-container { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px 0; }
        .slot-box { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary-cyan); overflow: hidden; position: relative; background: rgba(0,0,0,0.5); }
        .slot-track { display: flex; flex-direction: column; position: absolute; top: 0; animation: scroll-v-new 8s linear infinite; }
        @keyframes scroll-v-new { 0% { transform: translateY(0); } 100% { transform: translateY(-560px); } }
        .slot-item { width: 80px; height: 80px; background-size: 75%; background-repeat: no-repeat; background-position: center; }

        /* 🏆 賽制動畫 (修復關鍵) */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: rgba(10, 14, 23, 0.95); margin: 5vh auto; padding: 25px; border: 1px solid var(--primary-cyan); width: 90%; border-radius: 15px; max-width: 650px; }

        .bracket-box { position: relative; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 30px 10px; background: rgba(0, 0, 0, 0.4); border-radius: 12px; overflow: hidden; }
        
        /* 動畫類名 - 透過 JS 加入來觸發 */
        .animate-match { animation: slideInMatch 0.6s forwards !important; }
        .animate-final { animation: fadeInFinal 0.8s forwards 0.8s !important; }
        .animate-path { animation: drawPath 1.5s forwards 1s !important; }

        @keyframes slideInMatch { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInFinal { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes drawPath { to { stroke-dashoffset: 0; } }

        .energy-path { fill: none; stroke: var(--primary-cyan); stroke-width: 2; stroke-dasharray: 100; stroke-dashoffset: 100; opacity: 0.4; }
        .match-row { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; opacity: 0; }
        .final-match { width: 85%; padding: 15px; border: 2px solid var(--secondary-purple); border-radius: 10px; background: rgba(188, 19, 254, 0.1); text-align: center; opacity: 0; }
        .team-slot { padding: 5px 15px; border: 1px solid #555; border-radius: 5px; background: rgba(0,0,0,0.3); }
        .team-win { border-color: var(--primary-cyan); color: var(--primary-cyan); }

        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; width: 100%; max-width: 300px; }
        .btn-primary { background: var(--primary-cyan); color: #000; }
        .btn-outline { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

        @media (max-width: 480px) {
            .edition-text { font-size: 1.1rem; letter-spacing: 6px; }
            .main-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="BG_music.m4a" type="audio/mp4">
</audio>

<div id="musicBtn" class="music-btn" onclick="toggleMusic(event)">
    <span id="musicIcon" style="font-size: 22px;">🔇</span>
</div>

<div class="main-container">
    <div class="header-section">
        <div class="countdown-title">⚔️ 開戰倒數 ⚔️</div>
        <span class="edition-text">第 二 屆</span>
        <h1 class="main-title">歲歲三三擂台宴</h1>
        <div class="countdown-wrap">
            <div class="time-box"><span class="time-num" id="d">00</span><span>Days</span></div>
            <div class="time-box"><span class="time-num" id="h">00</span><span>Hrs</span></div>
            <div class="time-box"><span class="time-num" id="m">00</span><span>Mins</span></div>
            <div class="time-box"><span class="time-num" id="s">00</span><span>Secs</span></div>
        </div>
    </div>

    <div class="panel">
        <div class="slot-container">
            <div style="text-align: center;">
                <div class="slot-box" style="background-image: url('assets/1.png'); background-size: cover;"></div>
                <div style="color: var(--neon-green); margin-top: 5px;">核心：素問</div>
            </div>
            <div style="font-size: 2rem;">+</div>
            <div class="slot-box">
                <div class="slot-track">
                    <div class="slot-item" style="background-image: url('assets/4.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/8.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/5.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/2.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/3.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/6.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/7.png');"></div>
                </div>
            </div>
            <div class="slot-box">
                <div class="slot-track" style="animation-delay: -3s;">
                    <div class="slot-item" style="background-image: url('assets/2.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/5.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/8.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/7.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/4.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/6.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/3.png');"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-outline" onclick="openRules()">🏆 賽制流程說明</button>
        <button class="btn btn-primary" onclick="openModal('joinModal')">📢 立即報名參加</button>
    </div>
</div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--primary-cyan); text-align: center;">🏆 賽制流程詳解</h2>
        <div class="bracket-box">
            <svg class="path-container" viewBox="0 0 400 200" style="position:absolute; width:100%; height:100%;">
                <path id="pathLine" class="energy-path" d="M 200 40 L 200 75 M 200 160 L 200 125" />
            </svg>
            <div class="match-row" id="row1">
                <span class="team-slot team-win">隊伍 A (勝)</span> ⚔️ <span class="team-slot">隊伍 B (敗)</span>
            </div>
            <div class="final-match" id="finalBox">
                <div style="font-size: 0.7rem; color: var(--secondary-purple);">GRAND FINAL</div>
                <b>總決賽 BO3 爭霸</b>
            </div>
            <div class="match-row" id="row2">
                <span class="team-slot">隊伍 C (敗)</span> ⚔️ <span class="team-slot team-win">隊伍 D (勝)</span>
            </div>
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="closeModal('rulesModal')">關閉</button>
    </div>
</div>

<script>
    const bgMusic = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const musicIcon = document.getElementById('musicIcon');

    // 💡 1. 音樂自動播放修復：監聽全域點擊
    let hasInteracted = false;
    document.addEventListener('click', () => {
        if (!hasInteracted) {
            bgMusic.play().then(() => {
                musicIcon.innerText = "🎵";
                musicBtn.classList.add('music-playing');
                hasInteracted = true;
            }).catch(err => console.log("等待手動開啟"));
        }
    }, { once: false });

    function toggleMusic(e) {
        e.stopPropagation(); // 防止觸發全域點擊
        if (bgMusic.paused) {
            bgMusic.play();
            musicIcon.innerText = "🎵";
            musicBtn.classList.add('music-playing');
        } else {
            bgMusic.pause();
            musicIcon.innerText = "🔇";
            musicBtn.classList.remove('music-playing');
        }
    }

    // 💡 2. 賽制動畫修復：點擊時重新注入動畫類名
    function openRules() {
        document.getElementById('rulesModal').style.display = 'block';
        // 重置動畫
        const r1 = document.getElementById('row1');
        const r2 = document.getElementById('row2');
        const fb = document.getElementById('finalBox');
        const pl = document.getElementById('pathLine');

        r1.classList.remove('animate-match');
        r2.classList.remove('animate-match');
        fb.classList.remove('animate-final');
        pl.classList.remove('animate-path');

        void r1.offsetWidth; // 強制重繪觸發動畫

        r1.classList.add('animate-match');
        r2.classList.add('animate-match');
        fb.classList.add('animate-final');
        pl.classList.add('animate-path');
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 倒數計時邏輯
    function updateTimer() {
        const target = new Date("May 16, 2026 21:30:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;
        if(diff < 0) return;
        document.getElementById('d').innerText = Math.floor(diff/86400000).toString().padStart(2,'0');
        document.getElementById('h').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
        document.getElementById('m').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        document.getElementById('s').innerText = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
    }
    setInterval(updateTimer, 1000); updateTimer();

    // 紅點跟隨
    const trails = [];
    for(let i=0; i<8; i++) {
        let t = document.createElement('div');
        t.className = 'cursor-trail';
        document.body.appendChild(t);
        trails.push(t);
    }
    window.addEventListener('mousemove', (e) => {
        trails.forEach((t, i) => {
            setTimeout(() => {
                t.style.left = e.clientX + 'px';
                t.style.top = e.clientY + 'px';
                t.style.opacity = (8-i)/15;
            }, i * 15);
        });
    });
</script>

</body>
</html>
