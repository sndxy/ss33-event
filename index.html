<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歲歲三三擂台宴 - 競技官網</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --secondary-purple: #bc13fe;
            --bg-dark: #06090f;
            --panel-bg: rgba(6, 9, 15, 0.15); 
            --win-green: #00ff88;
            --lose-red: #ff0055;
            --neon-green: #39FF14;
        }

        /* 🚀 背景與滑鼠樣式 */
        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: "Microsoft JhengHei", -apple-system, sans-serif;
            color: #fff;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                url('BG.gif'); 
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            overflow-x: hidden;
        }

        /* 🔴 霧面紅點拖曳效果樣式 */
        .cursor-trail {
            width: 12px; height: 12px;
            background: rgba(255, 0, 0, 0.6);
            position: fixed;
            border-radius: 50%;
            pointer-events: none; /* 確保不干擾點擊 */
            z-index: 9999;
            transform: translate(-50%, -50%);
            filter: blur(4px); /* 營造霧霧的感覺 */
        }

        .main-container {
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 15px; box-sizing: border-box;
        }

        /* 🚀 標題樣式 */
        .header-section { text-align: center; margin-bottom: 30px; width: 100%; }
        .countdown-title { 
            color: var(--primary-cyan); font-weight: bold; letter-spacing: 5px; 
            margin-bottom: 8px; font-size: 1.1rem; text-shadow: 0 0 10px var(--primary-cyan); 
        }
        .main-title {
            font-family: 'Ma Shan Zheng', 'Noto Serif TC', serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 12vw, 5.5rem); 
            font-style: italic; 
            margin: 10px 0;
            letter-spacing: 4px; 
            position: relative;
            display: inline-block;
            color: transparent;
            background-image: linear-gradient(to bottom, #000000 0%, #660000 40%, #cc0000 70%, #ff4500 100%);
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 5px rgba(0, 0, 0, 1)) drop-shadow(0 0 12px rgba(255, 69, 0, 0.8)) drop-shadow(0 0 30px rgba(255, 0, 0, 0.4));
        }
        .main-title::after {
            content: "歲歲三三擂台宴";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            font-family: inherit; font-weight: inherit; font-style: inherit; 
            color: transparent;
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            mix-blend-mode: screen; 
            animation: fire-burn 2.5s ease-in-out infinite alternate;
            filter: blur(1.5px);
        }
        @keyframes fire-burn {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(2px, -4px) scale(1.03); opacity: 0.9; filter: blur(2px) drop-shadow(0 0 25px rgba(255, 69, 0, 0.7)); }
        }

        /* ⏳ 倒數計時 */
        .countdown-wrap { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .time-box { background: rgba(0, 0, 0, 0.4); border: 2px solid var(--primary-cyan); padding: 10px; border-radius: 12px; min-width: 65px; text-align: center; backdrop-filter: blur(2px); }
        .time-num { font-size: 1.8rem; font-weight: 900; color: var(--primary-cyan); display: block; line-height: 1; }
        .time-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; margin-top: 4px; display: block; }

        /* 🚀 面板樣式 */
        .panel { 
            background: var(--panel-bg); 
            border-radius: 20px; 
            border: 1.2px solid rgba(0, 242, 255, 0.4); 
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            width: 100%; max-width: 900px; margin-bottom: 25px; padding: 20px; box-sizing: border-box; 
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .panel-title { font-size: 1.1rem; font-weight: bold; color: var(--primary-cyan); margin: 0; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .match-time { background: var(--secondary-purple); padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }

        /* 🌿 核心奶媽池 */
        .slot-container { 
            display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px 0; width: 100%;
        }
        .icon-circle-main, .slot-box { 
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary-cyan);
            overflow: hidden; position: relative; background: rgba(0,0,0,0.5); flex-shrink: 0;
            transition: all 0.3s ease;
        }
        
        /* ✨ 職業閃爍動畫 (滑鼠移入效果) */
        .icon-circle-main:hover, .icon-circle:hover {
            border-color: #fff;
            animation: pulse-glow 0.8s infinite alternate;
            cursor: pointer;
        }
        @keyframes pulse-glow {
            from { box-shadow: 0 0 5px var(--primary-cyan); }
            to { box-shadow: 0 0 20px var(--primary-cyan), 0 0 30px rgba(0, 242, 255, 0.6); }
        }

        .icon-circle-main { background-size: cover; background-position: center; }
        .slot-track { display: flex; flex-direction: column; position: absolute; top: 0; animation: scroll-v-new 8s linear infinite; }
        @keyframes scroll-v-new { 0% { transform: translateY(0); } 100% { transform: translateY(-560px); } }
        .slot-item { width: 80px; height: 80px; background-size: 75%; background-repeat: no-repeat; background-position: center; flex-shrink: 0; }
        .core-label { font-size: 1.1rem; color: var(--neon-green); font-weight: bold; margin-top: 8px; text-shadow: 0 0 10px var(--neon-green); white-space: nowrap; }

        /* ⚔️ 暴力輸出池樣式 */
        .pool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .icon-circle { 
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary-cyan); margin: 0 auto 5px; 
            background-size: 70%; background-repeat: no-repeat; background-position: center; 
            background-color: rgba(0,0,0,0.4); transition: all 0.3s ease;
        }

        /* 🚀 按鈕樣式 */
        .btn-group { display: flex; gap: 15px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .btn { 
            padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; font-size: 1rem; width: 100%; max-width: 300px; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
        .btn-outline { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); }
        .btn-primary { background: var(--primary-cyan); color: #000; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        /* 🚀 彈窗與決賽圈動畫 (完整保留) */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); overflow-y: auto; }
        .modal-content { background: rgba(10, 14, 23, 0.9); margin: 5vh auto; padding: 25px; border: 1px solid var(--primary-cyan); width: 90%; border-radius: 15px; max-width: 650px; animation: modalFade 0.4s ease-out; }
        @keyframes modalFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .rules-detail-box { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 15px; margin-bottom: 20px; border-left: 4px solid var(--primary-cyan); }
        .rule-step-title { color: var(--primary-cyan); font-weight: bold; margin-bottom: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .dot-win { background: var(--win-green); animation: pulse-green 1.5s infinite; }
        .dot-lose { background: var(--lose-red); animation: pulse-red 1.5s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(255, 0, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); } }
        
        .bracket-box { position: relative; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 30px 10px; background: rgba(0, 0, 0, 0.4); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .match-row { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; z-index: 2; opacity: 0; }
        .match-row.top { animation: slideInMatch 0.6s forwards 0.2s; }
        .match-row.bottom { animation: slideInMatch 0.6s forwards 0.4s; }
        .team-slot { display: inline-block; padding: 5px 15px; border: 1px solid #555; border-radius: 5px; font-size: 0.85rem; background: rgba(0,0,0,0.3); }
        .team-slot.team-win { border-color: var(--primary-cyan); color: var(--primary-cyan); background: rgba(0, 242, 255, 0.05); animation: cyanGlow 2s infinite alternate; }
        .final-match { width: 85%; padding: 15px; border: 2px solid var(--secondary-purple); border-radius: 10px; background: rgba(188, 19, 254, 0.1); text-align: center; position: relative; z-index: 2; opacity: 0; animation: purpleBurn 3s infinite alternate, fadeInFinal 0.8s forwards 0.8s; }
        .vs-icon { color: #fff; font-size: 1rem; animation: vsPulse 1.5s infinite; }
        .path-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .energy-path { fill: none; stroke: var(--primary-cyan); stroke-width: 2; stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawPath 1.5s forwards 1s; opacity: 0.4; }

        @keyframes cyanGlow { from { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); } to { box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); } }
        @keyframes purpleBurn { 0% { box-shadow: 0 0 10px rgba(188, 19, 254, 0.3); transform: scale(1); } 100% { box-shadow: 0 0 25px rgba(188, 19, 254, 0.6); transform: scale(1.02); } }
        @keyframes vsPulse { 0% { opacity: 0.6; } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.6; } }
        @keyframes drawPath { to { stroke-dashoffset: 0; } }
        @keyframes slideInMatch { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInFinal { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .maker-credit { position: fixed; bottom: 10px; right: 15px; color: rgba(255, 255, 255, 0.3); font-size: 0.7rem; pointer-events: none; }

        /* 手機版修正 */
        @media (max-width: 480px) {
            body, html { background-size: contain; background-position: top center; background-attachment: scroll; }
            .cursor-trail { display: none; } /* 手機端隱藏拖曳紅點 */
            .main-title { font-size: 2.5rem; letter-spacing: 2px; }
            .pool-grid { grid-template-columns: repeat(3, 1fr); }
            .icon-circle-main, .slot-box, .slot-item { width: 65px; height: 65px; }
            @keyframes scroll-v-new { 0% { transform: translateY(0); } 100% { transform: translateY(-455px); } }
            .core-label { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <div class="countdown-title">⚔️ 開戰倒數 ⚔️</div>
        <h1 class="main-title">歲歲三三擂台宴</h1>
        <div class="countdown-wrap">
            <div class="time-box"><span class="time-num" id="d">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-num" id="h">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-num" id="m">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span class="time-num" id="s">00</span><span class="time-label">Secs</span></div>
        </div>
    </div>

    <div class="panel" style="text-align: center;">
        <div class="panel-header">
            <h2 class="panel-title">🌿 核心奶媽池 (1奶+2隨機)</h2>
            <div class="match-time">5/16 (六) 21:30 開始</div>
        </div>
        <div class="slot-container">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="icon-circle-main" style="background-image: url('assets/1.png');"></div>
                <div class="core-label">核心：素問</div>
            </div>
            <div style="font-size: 1.8rem; color: var(--secondary-purple); font-weight: 900; margin-bottom: 30px;">+</div>
            <div class="slot-box" style="margin-bottom: 30px;">
                <div class="slot-track">
                    <div class="slot-item" style="background-image: url('assets/4.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/8.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/5.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/2.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/3.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/6.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/7.png');"></div>
                </div>
            </div>
            <div class="slot-box" style="margin-bottom: 30px;">
                <div class="slot-track" style="animation-delay: -3.5s;">
                    <div class="slot-item" style="background-image: url('assets/2.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/5.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/8.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/7.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/6.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/4.png');"></div>
                    <div class="slot-item" style="background-image: url('assets/3.png');"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h2 class="panel-title">⚔️ 暴力輸出池 (DPS Only)</h2>
            <div class="match-time" style="background: #0066ff;">5/17 (日) 21:30 開始</div>
        </div>
        <div class="pool-grid">
            <div><div class="icon-circle" style="background-image: url('assets/4.png');"></div>碎夢</div>
            <div><div class="icon-circle" style="background-image: url('assets/8.png');"></div>玄機</div>
            <div><div class="icon-circle" style="background-image: url('assets/5.png');"></div>神相</div>
            <div><div class="icon-circle" style="background-image: url('assets/2.png');"></div>九靈</div>
            <div><div class="icon-circle" style="background-image: url('assets/3.png');"></div>鐵衣</div>
            <div><div class="icon-circle" style="background-image: url('assets/6.png');"></div>血河</div>
            <div><div class="icon-circle" style="background-image: url('assets/7.png');"></div>龍吟</div>
            <div><div class="icon-circle" style="background-image: url('assets/1.png');"></div>天問</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-outline" onclick="openModal('rulesModal')">🏆 賽制流程說明</button>
        <button class="btn btn-primary" onclick="openModal('joinModal')">📢 立即報名參加</button>
    </div>
</div>

<div class="maker-credit">製作者：夜月臨空</div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" style="color: var(--primary-cyan); text-align: center; font-size: 1.5rem; margin-bottom: 20px; font-weight: bold;">🏆 賽制流程詳解</div>
        <div class="rules-detail-box">
            <div class="rule-step-title">⚔️ 第一階段：預賽 (雙敗淘汰)</div>
            <p style="font-size: 0.85rem;">累積兩場勝場即晉級，累積兩場敗場則淘汰。</p>
        </div>
        <div class="rules-detail-box" style="border-left-color: #ff9d00;">
            <div class="rule-step-title" style="color: #ff9d00;">🔥 第二階段：決賽圈 BO3</div>
            <div class="bracket-box">
                <div class="final-match">總決賽爭霸</div>
            </div>
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="closeModal('rulesModal')">關閉說明</button>
    </div>
</div>

<div id="joinModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" style="color: var(--primary-cyan); text-align: center; font-size: 1.5rem; margin-bottom: 20px; font-weight: bold;">📢 報名方式</div>
        <p>請至 Discord 活動處報名。</p>
        <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="closeModal('joinModal')">我知道了</button>
    </div>
</div>

<script>
    // ⏳ 倒數計時
    function updateTimer() {
        const target = new Date("May 16, 2026 21:30:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;
        if(diff < 0) return;
        document.getElementById('d').innerText = Math.floor(diff/86400000).toString().padStart(2,'0');
        document.getElementById('h').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
        document.getElementById('m').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        document.getElementById('s').innerText = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
    }
    setInterval(updateTimer, 1000); updateTimer();

    // 🔴 霧面紅點拖曳美化腳本 (保留原生鼠標)
    const trails = [];
    const trailCount = 12; // 增加數量讓霧感更連貫

    for(let i=0; i<trailCount; i++) {
        let t = document.createElement('div');
        t.className = 'cursor-trail';
        document.body.appendChild(t);
        trails.push(t);
    }

    window.addEventListener('mousemove', (e) => {
        trails.forEach((t, index) => {
            // 使用 setTimeout 創造物理上的延遲跟隨感
            setTimeout(() => {
                t.style.left = e.clientX + 'px';
                t.style.top = e.clientY + 'px';
                // 越後面的點越淡、越小，營造消失感
                const ratio = (trailCount - index) / trailCount;
                t.style.opacity = ratio * 0.5;
                t.style.transform = `translate(-50%, -50%) scale(${ratio})`;
            }, index * 12); 
        });
    });

    // Modal 控制
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.onclick = function(event) { if (event.target.className === 'modal') { event.target.style.display = "none"; } }
</script>

</body>
</html>
