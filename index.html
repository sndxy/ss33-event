<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歲歲 33 擂台宴 - 官方賽事網頁</title>
    <style>
        :root {
            --fire-gold: #ffaa00;
            --glass-bg: rgba(10, 5, 5, 0.9);
            --border-glow: rgba(255, 170, 0, 0.6);
            --nurse-green: #a0ffd0;
            --win-green: #2ecc71;
            --lose-red: #e74c3c;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #000; color: #fff; overflow-x: hidden;
        }

        /* 🚀 讀取你上傳的 bg.gif */
        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                              url('bg.gif'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .main-ui {
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 20px;
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--fire-gold), #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 69, 0, 0.8));
            margin: 0 0 30px 0; letter-spacing: 12px;
            text-align: center;
        }

        /* 🏆 參考 IMG_2574 的極致圓潤面板 */
        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border-radius: 65px; 
            border: 2px solid var(--border-glow);
            width: 100%; max-width: 900px;
            margin-bottom: 30px; padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            transition: 0.3s ease;
        }

        .pool-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px; margin-top: 25px; text-align: center;
        }

        /* 職業圖片圓框 */
        .class-icon {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--fire-gold);
            margin: 0 auto 8px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 15px var(--border-glow);
            background-color: #222;
            position: relative;
        }

        /* 呼吸光效 */
        .class-icon::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }

        /* 階梯動畫 */
        .ladder-container {
            position: relative; width: 100%; max-width: 400px; margin: 30px auto;
        }
        .step {
            height: 50px; margin: 12px 0; border: 1px solid var(--fire-gold);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to right, rgba(255,170,0,0.1), rgba(0,0,0,0.4));
            font-weight: bold;
        }
        .challenger-dot {
            position: absolute; left: -10px; width: 40px; height: 40px;
            background: var(--fire-gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #000;
            font-weight: 900; box-shadow: 0 0 15px var(--fire-gold);
            animation: climb 6s infinite ease-in-out;
        }
        @keyframes climb {
            0% { bottom: 0; opacity: 1; }
            30% { bottom: 62px; }
            60% { bottom: 124px; }
            90% { bottom: 186px; opacity: 1; }
            100% { bottom: 186px; opacity: 0; }
        }

        .cta-btn {
            background: linear-gradient(45deg, #b22222, #ff4500);
            color: white; padding: 18px 70px; border-radius: 50px;
            font-size: 1.4rem; font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.5);
            transition: 0.3s;
        }
        .cta-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="bg-video"></div>

<div class="main-ui">
    <h1 class="main-title">歲歲 33 擂台宴</h1>

    <div class="panel">
        <h2 style="color: var(--fire-gold); margin:0; text-align: center;">⚔️ 暴力輸出池</h2>
        <div class="pool-grid">
            <div><div class="class-icon" style="background-image: url('4.jpg');"></div>碎夢</div>
            <div><div class="class-icon" style="background-image: url('8.jpg');"></div>玄機</div>
            <div><div class="class-icon" style="background-image: url('5.jpg');"></div>神相</div>
            <div><div class="class-icon" style="background-image: url('2.jpg');"></div>九靈</div>
            <div><div class="class-icon" style="background-image: url('3.jpg');"></div>鐵衣</div>
            <div><div class="class-icon" style="background-image: url('6.jpg');"></div>血河</div>
            <div><div class="class-icon" style="background-image: url('7.jpg');"></div>龍吟</div>
            <div><div class="class-icon" style="background-image: url('1.jpg');"></div>天問</div>
        </div>
    </div>

    <div class="panel" style="border-color: var(--nurse-green);">
        <h2 style="color: var(--nurse-green); margin:0; text-align: center;">🌿 核心奶媽池</h2>
        <div style="display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 25px;">
            <div style="text-align:center;">
                <div class="class-icon" style="border-color: var(--nurse-green); background-image: url('1.jpg');"></div>
                素問(素心)
            </div>
            <div style="font-size: 2.5rem; color: var(--fire-gold);">+</div>
            <div style="text-align:center;">
                <div class="class-icon" style="display:flex; align-items:center; justify-content:center; font-size:1.5rem;">隨</div>
                隨機 2 輸出
            </div>
        </div>
    </div>

    <div class="panel">
        <h2 style="color: var(--fire-gold); text-align: center; margin-top: 0;">🏆 賽事流程說明</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px;">
            <div>
                <h3>1. 預賽：雙敗淘汰</h3>
                <p>兩勝晉級決賽圈，兩敗則遺憾淘汰。</p>
                <div style="display: flex; align-items: center; gap: 15px; margin: 15px 0;">
                    <div style="width:25px; height:25px; background:var(--win-green); border-radius:50%; box-shadow: 0 0 15px var(--win-green);"></div>
                    <div style="width:25px; height:25px; background:var(--win-green); border-radius:50%; box-shadow: 0 0 15px var(--win-green);"></div>
                    <span style="color:var(--win-green); font-weight:bold;">勝勝 ➔ 晉級</span>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div style="width:25px; height:25px; background:var(--lose-red); border-radius:50%; box-shadow: 0 0 15px var(--lose-red);"></div>
                    <div style="width:25px; height:25px; background:var(--lose-red); border-radius:50%; box-shadow: 0 0 15px var(--lose-red);"></div>
                    <span style="color:var(--lose-red); font-weight:bold;">敗敗 ➔ 淘汰</span>
                </div>
            </div>
            <div class="ladder-container">
                <div class="challenger-dot">隊</div>
                <div class="step" style="border-color:#fff; box-shadow: 0 0 15px #fff;">🏆 最終擂台主 (決賽)</div>
                <div class="step">第三挑戰位 (BO3)</div>
                <div class="step">第二挑戰位 (BO3)</div>
                <div class="step">第一挑戰位 (BO3)</div>
            </div>
        </div>
    </div>

    <button class="cta-btn" onclick="window.location.href='這裡放你的Discord或報名連結'">立即前往報名</button>
</div>

</body>
</html>
